apiVersion: v1
kind: Service
metadata:
  name: ai-api-gateway-svc
spec:
  selector:
    app: ai-api-gateway
  ports:
    - name: api
      protocol: TCP
      port: 8100
      targetPort: 8100
  type: LoadBalancer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cognitive-companion-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.domain.com
      secretName: cognitive-companion-tls
  rules:
    - host: api.domain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-api-gateway-svc
                port:
                  number: 8100